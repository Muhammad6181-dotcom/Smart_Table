<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Table</title>
<link rel="stylesheet" href="style.css  ">
</head>
<body>
<h2>Foydalanuvchi ro‘yxati</h2>

<input type="text" id="inputName" placeholder="Enter Name">
<input type="text" id="inputLastName" placeholder="Enter Last Name">
<input type="number" id="inputAge" placeholder="Enter Age">
<input type="number" id="inputBalance" placeholder="Enter Balance">
<button onclick="addPerson()">Show</button>
<button onclick="randomSort()">Random Sort</button>

<table border="1">
    <thead>
        <tr>
            <th onclick="sortTable('name', event)">Name</th>
            <th onclick="sortTable('lastName', event)">Last Name</th>
            <th onclick="sortTable('age', event)">Age</th>
            <th onclick="sortTable('balance', event)">Balance</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="res"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
